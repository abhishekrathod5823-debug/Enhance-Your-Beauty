<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elegant Beauty - Checkout</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Pinyon+Script&display=swap" rel="stylesheet">

    <style>
        /* --- CSS SECTION --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(180deg, #FAD6E7 0%, #FAF1C6 100%);
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            padding: 20px;
        }

        /* Header */
        .brand-title {
            font-family: 'Pinyon Script', cursive;
            font-size: 3.5rem;
            text-align: center;
            margin-top: 20px;
        }

        .navbar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 10px 0;
            border-top: 1px solid black;
            border-bottom: 1px solid black;
            padding: 10px 0;
        }

        .navbar a { text-decoration: none; color: black; font-weight: 700; }

        /* Main Section (Split Layout) */
        .main-layout {
            display: flex;
            margin-top: 40px;
            gap: 40px;
            text-align: left;
            position: relative;
        }

        /* Left Side: Display Info */
        .info-display {
            flex: 1;
            padding-right: 20px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .vertical-line {
            width: 1px;
            background-color: black;
        }

        /* Right Side: Form */
        .form-section {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .info-display p { font-size: 1.1rem; line-height: 1.5; }
        .info-display b { display: block; margin-bottom: 5px; }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: none;
            background-color: #f5f5f5;
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            outline: none;
        }

        textarea { height: 100px; resize: none; }

        .submit-btn {
            background-color: white;
            color: black;
            border: none;
            padding: 15px;
            font-weight: 700;
            font-size: 1.2rem;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .submit-btn:hover { background-color: black; color: white; }

        /* POPUP MODAL STYLING */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: none; /* Initially hidden */
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: popIn 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal h2 { margin-bottom: 15px; color: #d63384; }
        .modal p { margin-bottom: 25px; font-size: 1.1rem; }

        .ok-btn {
            background: #FAD6E7;
            border: none;
            padding: 10px 40px;
            font-weight: 700;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1rem;
        }

        .ok-btn:hover { background: #f3a6c6; }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="brand-title">Elegant Beauty</h1>
        <nav class="navbar">
            <a href="#">Home</a>
            <a href="#">Product</a>
            <a href="#">Buy-Cart</a>
            <a href="#">My Account</a>
        </nav>

        <div class="main-layout">
            <div class="info-display">
                <p><b>email:</b> <span id="disp-email">info@elegantbeauty.com</span></p>
                <p><b>phone:</b> <span id="disp-phone">+91 01234 56789</span></p>
                <p id="disp-address">123 Beauty Lane,<br>City, State 12345</p>
                <p><b>Customer Name:</b> <span id="disp-name">---</span></p>
            </div>

            <div class="vertical-line"></div>

            <div class="form-section">
                <input type="text" id="input-name" placeholder="Your Name:" onkeyup="updateLive()">
                <input type="email" id="input-email" placeholder="Your Email:" onkeyup="updateLive()">
                <input type="text" id="input-phone" placeholder="Contact No.:" onkeyup="updateLive()">
                <textarea id="input-address" placeholder="Address:" onkeyup="updateLive()"></textarea>
                
                <button class="submit-btn" onclick="showPopup()">Submit</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2>Success!</h2>
            <p>Thank you! Your order has been placed successfully. We will contact you soon.</p>
            <button class="ok-btn" onclick="goToLink()">OK</button>
        </div>
    </div>

    <script>
        /* --- JAVASCRIPT SECTION --- */

        // 1. Live Preview Logic
        function updateLive() {
            const name = document.getElementById('input-name').value;
            const email = document.getElementById('input-email').value;
            const phone = document.getElementById('input-phone').value;
            const address = document.getElementById('input-address').value;

            if(name) document.getElementById('disp-name').innerText = name;
            if(email) document.getElementById('disp-email').innerText = email;
            if(phone) document.getElementById('disp-phone').innerText = phone;
            if(address) document.getElementById('disp-address').innerText = address;
        }

        // 2. Show Popup Logic
        function showPopup() {
            document.getElementById('modalOverlay').style.display = 'flex';
        }

        // 3. Final Redirect Logic
        function goToLink() {
            // Yahan apni link dalein jahan aap user ko bhejna chahte hain
            window.location.href = "index.html"; 
        }
    </script>

</body>
</html>
