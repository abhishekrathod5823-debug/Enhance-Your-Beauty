<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elegant Beauty - Lipstick Collection</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Pinyon+Script&display=swap" rel="stylesheet">

    <style>
        /* --- CSS SECTION --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(180deg, #FAD6E7 0%, #FAF1C6 100%);
            color: black;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 50px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            text-align: center;
        }

        /* Header & Nav */
        .brand-title {
            font-family: 'Pinyon Script', cursive;
            font-size: 4rem;
            margin-top: 30px;
        }

        .navbar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 15px 0;
            border-top: 1px solid black;
            border-bottom: 1px solid black;
            padding: 10px 0;
        }

        .navbar a {
            text-decoration: none;
            color: black;
            font-weight: 700;
            font-size: 1.1rem;
        }

        /* Category Header Section */
        .category-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            margin: 30px 0;
            text-align: left;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            padding-bottom: 20px;
        }

        .category-img {
            width: 150px;
            height: 100px;
            border-radius: 20px;
            object-fit: cover;
            background: black;
        }

        .category-info h2 { font-size: 3rem; font-weight: 700; }
        .category-info p { font-size: 1.1rem; }

        /* Product Grid */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            margin-top: 40px;
            padding: 0 20px;
        }

        /* Pure White Box (Card) */
        .product-card {
            background: white;
            border-radius: 30px;
            padding: 25px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            
            /* Animation Properties */
            transition: all 0.3s ease-in-out;
        }

        /* Card Animation on Hover */
        .product-card:hover {
            transform: translateY(-10px); /* Card upar uthega */
            box-shadow: 0 15px 30px rgba(0,0,0,0.15); /* Shadow gehri hogi */
            background-color: #fffdfd;
        }

        .product-card img {
            width: 100px;
            height: 120px;
            object-fit: contain;
            margin-bottom: 15px;
        }

        .brand-name { font-weight: 700; font-size: 1.2rem; margin-bottom: 5px; }
        .price { font-weight: 400; font-size: 1rem; margin-bottom: 15px; }

        /* Buy Button (The Actual Link) */
        .buy-btn {
            display: inline-block;
            background-color: #F8C8DC; /* Light pinkish button */
            color: black;
            text-decoration: none;
            padding: 8px 35px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.9rem;
            transition: background 0.3s;
        }

        .buy-btn:hover {
            background-color: #f3a6c6; /* Hover par thoda dark pink */
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .product-grid { grid-template-columns: repeat(2, 1fr); }
            .category-header { flex-direction: column; text-align: center; }
        }
        @media (max-width: 480px) {
            .product-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="brand-title">Elegant Beauty</h1>
        
        <nav class="navbar">
            <a href="#">Home</a>
            <a href="#">Product</a>
            <a href="#">Buy-Cart</a>
            <a href="#">My Account</a>
        </nav>

        <div class="category-header">
            <img src="lipstic.jpg" alt="Lipstick" class="category-img">
            <div class="category-info">
                <h2>Lipstick</h2>
                <p>Own every shade of you</p>
            </div>
        </div>

        <div class="product-grid">
            
            <div class="product-card">
                <img src="l1.jpg" alt="Dior">
                <p class="brand-name">Dior</p>
                <p class="price">Rs. 499</p>
                <a href="l1.html" class="buy-btn">Buy</a>
            </div>

            <div class="product-card">
                <img src="l2.jpg" alt="YSL">
                <p class="brand-name">YSL</p>
                <p class="price">Rs. 699</p>
                <a href="l2.html" class="buy-btn">Buy</a>
            </div>

            <div class="product-card">
                <img src="l3.jpg" alt="Sugar">
                <p class="brand-name">Sugar</p>
                <p class="price">Rs. 400</p>
                <a href="l3.html" class="buy-btn">Buy</a>
            </div>

            <div class="product-card">
                <img src="l4.jpg" alt="MAC">
                <p class="brand-name">MAC</p>
                <p class="price">Rs. 499</p>
                <a href="l4.html" class="buy-btn">Buy</a>
            </div>

            <div class="product-card">
                <img src="l5.jpg" alt="Elf">
                <p class="brand-name">Elf</p>
                <p class="price">Rs. 499</p>
                <a href="l5.html" class="buy-btn">Buy</a>
            </div>

            <div class="product-card">
                <img src="l6.png" alt="Lakme">
                <p class="brand-name">Lakme</p>
                <p class="price">Rs. 499</p>
                <a href="l6.html" class="buy-btn">Buy</a>
            </div>

        </div>
    </div>

</body>
</html>
